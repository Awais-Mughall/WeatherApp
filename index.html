<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>☁️ Weather App</h1>

        <input
            type="text"
            id="city"
            placeholder="Enter City Name">

        <button id="searchBtn">
            Search
        </button>

        <div class="weather-info">

            <h2 id="cityName">
                📍 City Name
            </h2>

            <h3 id="temperature">
                🌡️ Temperature :
            </h3>

            <h3 id="humidity">
                💧 Humidity :
            </h3>

            <h3 id="windSpeed">
                🌬️ Wind Speed :
            </h3>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
